<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <section class="card" aria-labelledby="main-heading">
      <h1 id="main-heading">Save Our Wildlife</h1>

      <video id="wildlifeVideo" class="wildlife-video" controls aria-label="Promotional wildlife conservation video">
        <source src="wildlife.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <p class="description">
        Wildlife is an important part of our planet. By protecting animals and their habitats,
        we help keep nature balanced for future generations.
      </p>

      <button id="videoButton" type="button">
        Hide Video
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
